<svg viewBox="0 0 720 232" xmlns="http://www.w3.org/2000/svg" role="img"><style>text{font-family:'Inter',system-ui,sans-serif}</style><text x="220" y="65" text-anchor="end" font-size="12.5" fill="#26313f">Peak hardware throughput</text><rect x="232" y="42" width="410" height="34" rx="4" fill="#16243a"/><text x="652" y="65" font-size="12.5" fill="#16243a" font-weight="600">100%</text><text x="220" y="121" text-anchor="end" font-size="12.5" fill="#26313f">after real utilization</text><rect x="232" y="98" width="41" height="34" rx="4" fill="#0d7d74"/><text x="283" y="121" font-size="12.5" fill="#0d7d74" font-weight="600">~10%</text><text x="220" y="177" text-anchor="end" font-size="12.5" fill="#26313f">after radiation tax</text><rect x="232" y="154" width="35" height="34" rx="4" fill="#0f766e"/><text x="277" y="177" font-size="12.5" fill="#0f766e" font-weight="600">~8.6% delivered</text><text x="360" y="212" text-anchor="middle" font-size="12.5" fill="#26313f">delivered useful compute is a small fraction of the headline peak</text></svg>